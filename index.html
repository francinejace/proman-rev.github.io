<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PMI Certification Reviewer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>PMI Certification Quiz Reviewer</h1>

        <div class="mode-select">
            <button onclick="startQuiz('review')">Reviewer Mode</button>
            <button onclick="startQuiz('exam')">Exam Mode</button>
        </div>

        <div id="quizArea" style="display:none;">

            <div class="topbar">

                <div id="progressBar">
                    <div id="progress"></div>
                </div>

                <div id="scoreBox">
                    Score: 0
                </div>

            </div>

            <div id="questionCounter"></div>

            <div id="questionBox"></div>

            <div class="nav">
                <button id="prevBtn">Previous</button>
                <button id="nextBtn">Next</button>
            </div>

        </div>

    </div>

    <div id="popup" class="popup">

        <div class="popup-content">
            <p id="explanationText"></p>
            <button onclick="closePopup()">Close</button>
        </div>

    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>

</body>

</html>
